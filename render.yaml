services:
  - type: web
    name: educon-pos-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: educon-pos-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.10

  - type: static
    name: educon-pos-web
    rootDir: pos-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://educon-pos-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: educon-pos-db
    databaseName: educon_pos
    user: educon_pos_user
