name = "educon-pos-backend"
main = "src/index.js"
compatibility_date = "2024-12-01"

[observability]
enabled = true

[[containers]]
class_name = "Backend"
image = "./Dockerfile"
max_instances = 3
instance_type = "basic"

[[durable_objects.bindings]]
class_name = "Backend"
name = "BACKEND"

[[migrations]]
new_sqlite_classes = ["Backend"]
tag = "v1"
